name: parallel job execution testing

on: workflow_dispatch

jobs:
  job1:
    runs-on: ubuntu-latest
    steps:
      - name: job1
        run: echo "job1 is running"
  job2:
    runs-on: ubuntu-latest
    needs: job1
    steps:
      - name: job2
        run: echo "job2 is running"
  job3:
    runs-on: ubuntu-latest
    needs: job2
    steps:
      - name: job3
        run: echo "job3 is running"
  job4:
    runs-on: ubuntu-latest
    needs: job3
    steps:
      - name: job4
        run: echo "job4 is running"
    
